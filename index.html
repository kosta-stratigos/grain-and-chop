<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grain and Chop</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div class="hero-copy">
          <h1>Grain and Chop</h1>
          <p class="subhead">Patterned Granular Synthesizer and Sample Chopper</p>
        </div>
      </header>

      <main class="layout">
        <section class="panel panel-wide">
          <div class="panel-head">
            <div class="panel-head-copy">
              <h2>Sample</h2>
              <p id="sample-status" class="sample-name"></p>
            </div>
            <label class="file-picker primary sample-file-picker">
              <span>Load Sample</span>
              <input id="sample-input" type="file" accept="audio/*" />
            </label>
          </div>
          <canvas id="waveform" width="1200" height="168"></canvas>
          <div class="region-grid">
            <label>
              Start
              <input id="region-start" type="range" min="0" max="1000" value="0" />
            </label>
            <label>
              End
              <input id="region-end" type="range" min="0" max="1000" value="1000" />
            </label>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Track Settings</h2>
          </div>
          <div id="track-selector" class="track-selector"></div>
          <div class="control-grid track-settings-grid">
            <label class="compact-field">
              Mode
              <select id="mode">
                <option value="granular">Grain</option>
                <option value="chop">Chop</option>
              </select>
            </label>
            <label class="compact-field">
              Reverse
              <span class="toggle-card">
                <input id="reverse" type="checkbox" />
                <span>Enabled</span>
              </span>
            </label>
            <label class="compact-field">
              Slices
              <div class="slider-row">
                <input id="slice-count" type="range" min="2" max="16" value="8" />
                <span id="slice-count-value" class="value-pill">8</span>
              </div>
            </label>
            <label class="compact-field">
              Grain Location
              <select id="grain-location">
                <option value="fixed">Fixed</option>
                <option value="sequential">Sequential</option>
                <option value="sweep">Sweep</option>
                <option value="random">Random</option>
              </select>
            </label>
            <label class="compact-field">
              Grain Size (ms)
              <div class="slider-row">
                <input id="grain-size" type="range" min="20" max="350" value="110" />
                <span id="grain-size-value" class="value-pill">110</span>
              </div>
            </label>
            <label class="compact-field">
              Density (grains/s)
              <div class="slider-row">
                <input id="grain-density" type="range" min="2" max="40" value="12" />
                <span id="grain-density-value" class="value-pill">12</span>
              </div>
            </label>
            <label class="compact-field">
              Spray
              <div class="slider-row">
                <input id="spray" type="range" min="0" max="100" value="18" />
                <span id="spray-value" class="value-pill">0.18</span>
              </div>
            </label>
            <label class="compact-field">
              Pitch (semitones)
              <div class="slider-row">
                <input id="pitch" type="range" min="-12" max="12" value="0" />
                <span id="pitch-value" class="value-pill">0</span>
              </div>
            </label>
            <label class="compact-field">
              Chop Gate
              <div class="slider-row">
                <input id="chop-gate" type="range" min="10" max="100" value="70" />
                <span id="chop-gate-value" class="value-pill">70%</span>
              </div>
            </label>
          </div>
        </section>

        <div class="sidebar-stack">
          <section class="panel mixer-panel">
            <div class="panel-head">
              <h2>Track Mixer</h2>
            </div>
            <div id="mixer-grid" class="mixer-grid"></div>
          </section>

          <section class="panel micro-panel">
            <div class="panel-head">
              <div class="panel-head-copy">
                <h2>Playback Control</h2>
              </div>
            </div>
            <div class="control-grid micro-control-grid">
              <label class="compact-field span-2">
                BPM
                <div class="slider-row">
                  <input id="bpm" type="range" min="60" max="180" value="112" />
                  <span id="bpm-value" class="value-pill">112</span>
                </div>
              </label>
              <label class="compact-field span-2">
                Swing
                <div class="slider-row">
                  <input id="swing" type="range" min="0" max="100" value="0" />
                  <span id="swing-value" class="value-pill">0%</span>
                </div>
              </label>
              <div class="transport-single span-2">
                <button id="transport-toggle" class="primary">Play</button>
              </div>
            </div>
          </section>
        </div>

        <section class="panel panel-wide">
          <div class="panel-head panel-head-pattern">
            <div class="panel-head-copy">
              <h2>Pattern</h2>
            </div>
            <div class="pattern-head-actions">
              <div class="fill-pattern-control">
                <label class="fill-density-control">
                  <span class="pattern-steps-meta">
                    <span>Fill Density</span>
                    <span id="fill-density-value" class="pattern-steps-value">50%</span>
                  </span>
                  <input id="fill-density" type="range" min="0" max="100" value="50" />
                </label>
                <button id="randomize-pattern">Fill Pattern</button>
              </div>
              <label class="pattern-rate-control">
                <span class="pattern-steps-meta">
                  <span>Track Rate</span>
                </span>
                <select id="track-rate">
                  <option value="1/1">1/1</option>
                  <option value="1/2">1/2</option>
                  <option value="1/4">1/4</option>
                  <option value="1/8">1/8</option>
                  <option value="1/16">1/16</option>
                  <option value="1/32">1/32</option>
                </select>
              </label>
            </div>
          </div>
          <div id="pattern-grid" class="pattern-grid"></div>
        </section>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
